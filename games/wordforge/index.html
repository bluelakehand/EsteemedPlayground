<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wordforge</title>
    <meta
      name="description"
      content="Guide A.R.L.O. through the ruins, mine letters, and rebuild Earth."
    >
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../../arcade-home-link.css">
  </head>
  <body>
    <a class="arcade-home-link" href="../../">Esteemed Arcade</a>

    <main class="shell">
      <section class="game-header" aria-labelledby="game-title">
        <div>
          <p class="eyebrow">Archive Recovery &amp; Language Operator</p>
          <h1 id="game-title">Wordforge</h1>
        </div>
        <div class="mission-panel">
          <span class="panel-label">A.R.L.O.</span>
          <strong>Find letters. Rebuild Earth.</strong>
        </div>
      </section>

      <section class="stage-shell" aria-label="Wordforge platformer">
        <canvas id="game-canvas" width="960" height="540" aria-label="Wordforge platformer stage"></canvas>
        <div class="hud">
          <div>
            <span class="hud-label">Controls</span>
            <strong>W jump / A left / D right</strong>
          </div>
          <div>
            <span class="hud-label">Carry</span>
            <div class="inventory-slots" id="inventory-slots" aria-label="Letter inventory"></div>
          </div>
          <div>
            <span class="hud-label">Tools</span>
            <div class="tool-slots" id="tool-slots" aria-label="Unlocked tools"></div>
          </div>
        </div>
      </section>
    </main>

    <div class="crafting-window hidden" id="crafting-window" role="dialog" aria-modal="true" aria-labelledby="crafting-title">
      <div class="crafting-panel">
        <div class="crafting-header">
          <div>
            <span class="panel-label">Crafting Machine</span>
            <h2 id="crafting-title">Wordforge Recipes</h2>
          </div>
          <button class="exit-button" id="crafting-exit" type="button">Exit</button>
        </div>
        <div class="crafting-body">
          <section class="letter-bank" aria-label="Stored letters">
            <h3>Stored Letters</h3>
            <div class="stored-letter-grid" id="stored-letter-grid"></div>
          </section>
          <section class="craft-tree" aria-label="Crafting tree">
            <h3>Craft Tree</h3>
            <div class="craft-workbench hidden" id="craft-workbench" aria-label="Crafting workbench">
              <div class="craft-result hidden" id="craft-result">
                <img id="craft-result-image" src="images/craft items/spade.png" alt="">
                <strong id="craft-result-name">Spade</strong>
              </div>
              <div class="craft-attempt">
                <div class="craft-slots" id="craft-slots" aria-label="Crafting slots"></div>
                <img class="craft-target-preview" id="craft-target-preview" src="images/craft items/spade_black.png" alt="">
              </div>
              <button class="try-craft-button" id="try-craft-button" type="button">Try to Craft</button>
              <p class="craft-message" id="craft-message" aria-live="polite"></p>
            </div>
            <div class="tree-view">
              <button class="craft-node branch-left" id="spade-node" type="button" data-recipe="spade" aria-label="Spade recipe">
                <img id="spade-node-image" src="images/craft items/spade_black.png" alt="">
                <strong class="craft-node-name hidden" id="spade-node-name">Spade</strong>
                <span class="recipe-boxes" aria-hidden="true">
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                </span>
              </button>
              <button class="craft-node branch-right" id="pick-node" type="button" data-recipe="pick" aria-label="Pick recipe">
                <img id="pick-node-image" src="images/craft items/pick_black.png" alt="">
                <strong class="craft-node-name hidden" id="pick-node-name">Pick</strong>
                <span class="recipe-boxes" aria-hidden="true">
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                </span>
              </button>
              <button class="craft-node branch-left" id="beam-node" type="button" data-recipe="beam" aria-label="Beam recipe">
                <img id="beam-node-image" src="images/craft items/beam_black.png" alt="">
                <strong class="craft-node-name hidden" id="beam-node-name">Beam</strong>
                <span class="recipe-boxes" aria-hidden="true">
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                </span>
              </button>
              <button class="craft-node branch-right" id="bag-node" type="button" data-recipe="bag" aria-label="Bag recipe">
                <img id="bag-node-image" src="images/craft items/bag_black.png" alt="">
                <strong class="craft-node-name hidden" id="bag-node-name">Bag</strong>
                <span class="recipe-boxes" aria-hidden="true">
                  <span></span>
                  <span></span>
                  <span></span>
                </span>
              </button>
            </div>
          </section>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
