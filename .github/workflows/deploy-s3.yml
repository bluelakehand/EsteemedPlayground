name: Deploy Arcade to S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  S3_BUCKET: esteemed-playground-bucket

jobs:
  deploy:
    name: Sync static site
    runs-on: ubuntu-latest
    environment: env

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Pre-generate daily songs
        run: |
          mkdir -p games/dancing-and-dancing/songs
          for i in $(seq 0 13); do
            SEED=$(python3 -c "
          from datetime import date, timedelta
          d = date.today() + timedelta(days=$i)
          print(f'{d.month}-{d.day}-{d.year}')
          ")
            echo "Generating seed: $SEED"
            python3 tools/autotracker3.py "$SEED" "games/dancing-and-dancing/songs/${SEED}.it" || true
          done
          for SEED in menu-1 menu-2 menu-3; do
            echo "Generating menu song: $SEED"
            python3 tools/autotracker3.py "$SEED" "games/dancing-and-dancing/songs/${SEED}.it" || true
          done

      - name: Deploy files to S3
        run: |
          aws s3 sync . "s3://${S3_BUCKET}" \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "node_modules/*" \
            --exclude "package-lock.json" \
            --exclude "package.json" \
            --exclude "scripts/*"
